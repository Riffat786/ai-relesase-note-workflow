name: AI Release Note Pipeline

on:
  push:
    branches:
      - Riffat

  workflow_dispatch:

jobs:
  verify-workflow:
    name: Verify Repository

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Display Branch
        run: |
          echo "Current Branch:"
          git branch --show-current

      - name: Validate Repository
        run: |
          python ci/validate_repository.py

      - name: Display Data Folder
        run: |
          echo "==========================================="
          echo "Contents of data/"
          echo "==========================================="
          ls -R data

      - name: Display Output Folder
        run: |
          echo "==========================================="
          echo "Contents of output/"
          echo "==========================================="
          ls -R output || true

      - name: Workflow Complete
        run: |
          echo "==========================================="
          echo " AI Release Note Pipeline"
          echo "==========================================="
          echo ""
          echo "Repository successfully checked out."
          echo ""
          echo "Running on branch:"
          git branch --show-current
          echo ""
          echo "Repository structure verified."
          echo "Data folder accessible."
          echo "Output folder accessible."
          echo ""
          echo "GitHub Actions is configured correctly."
          echo "Ready for Phase 2 automation."
          echo ""
          echo "==========================================="
